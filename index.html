<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS:GO Aim Trainer - AK-47</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-container">
        <div class="ui-box pontos">Pontos: <span id="score">0</span></div>
        <div class="ui-box arma">Arma: <span>AK-47</span></div>
        <div class="ui-box municao">Munição: <span id="ammo">30</span>/30</div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="reload-alert">RECARREGUE! (Pressione R)</div>
    </div>

    <div id="instrucoes">
        <p>🖱️ Clique com o botão esquerdo para **Atirar** | ⌨️ Pressione **R** para **Recarregar**</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const ammoEl = document.getElementById('ammo');
        const reloadAlert = document.getElementById('reload-alert');

        // Configurações do Estado do Jogo
        let score = 0;
        let ammo = 30;
        const maxAmmo = 30;
        let isReloading = false;
        let flashOpacity = 0;

        // Inimigos/Alvos
        let enemies = [];
        const maxEnemies = 3;

        class Enemy {
            constructor() {
                this.radius = Math.random() * 12 + 15; // Tamanho do alvo
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = Math.random() * (canvas.height - this.radius * 2) + this.radius;
                this.pulse = 0;
            }

            draw() {
                this.pulse += 0.08;
                let animatedRadius = this.radius + Math.sin(this.pulse) * 1.5;

                // Círculo Externo (Silhueta do Inimigo)
                ctx.beginPath();
                ctx.arc(this.x, this.y, animatedRadius, 0, Math.PI * 2);
                ctx.fillStyle = '#d63031';
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();
                ctx.closePath();

                // Centro (Pontinho de Headshot)
                ctx.beginPath();
                ctx.arc(this.x, this.y, animatedRadius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.closePath();
            }
        }

        function spawnEnemies() {
            while (enemies.length < maxEnemies) {
                enemies.push(new Enemy());
            }
        }

        // Sistema de Tiro
        canvas.addEventListener('mousedown', (e) => {
            if (isReloading) return;

            if (ammo <= 0) {
                reloadAlert.style.display = 'block';
                return;
            }

            // Disparo da AK-47
            ammo--;
            ammoEl.innerText = ammo;
            flashOpacity = 0.25; // Efeito visual de disparo

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Checagem de acerto (Hitbox)
            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                let distance = Math.hypot(mouseX - enemy.x, mouseY - enemy.y);

                if (distance < enemy.radius) {
                    enemies.splice(i, 1);
                    score += 100;
                    scoreEl.innerText = score;
                    spawnEnemies();
                    break;
                }
            }
        });

        // Sistema de Recarga
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r' && ammo < maxAmmo && !isReloading) {
                isReloading = true;
                reloadAlert.innerText = "RECARREGANDO AK-47...";
                reloadAlert.style.display = 'block';
                reloadAlert.style.color = '#54a0ff';

                setTimeout(() => {
                    ammo = maxAmmo;
                    ammoEl.innerText = ammo;
                    isReloading = false;
                    reloadAlert.style.display = 'none';
                    reloadAlert.style.color = '#ff3838';
                    reloadAlert.innerText = "RECARREGUE! (Pressione R)";
                }, 1000); // 1 segundo de reload
            }
        });

        // Loop de Renderização
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar alvos
            enemies.forEach(enemy => enemy.draw());

            // Flash do Tiro (Recoil Visual)
            if (flashOpacity > 0) {
                ctx.fillStyle = `rgba(255, 235, 150, ${flashOpacity})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                flashOpacity -= 0.04;
            }

            requestAnimationFrame(gameLoop);
        }

        // Inicializar jogo
        spawnEnemies();
        gameLoop();
    </script>
</body>
</html>
